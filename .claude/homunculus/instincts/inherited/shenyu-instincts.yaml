# Shenyu Workflow Improve Test Coverage

## Action

Follow the improve-test-coverage workflow:
1. Identify classes or packages with low or missing test coverage.
2. Add new test files or enhance existing test files under the corresponding test directory.
3. Commit changes with a message referencing improved test coverage for the targeted area.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: **/src/test/java/**/*.java

